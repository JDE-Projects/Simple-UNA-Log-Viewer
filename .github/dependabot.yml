# Dependabot opens review-PRs when updates are available for:
#  - pip: the pinned build deps in requirements.txt
#  - github-actions: the pinned Build-Tools workflow this repo calls
version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    ignore:
      # ruff and pytest are pinned centrally in Build-Tools
      # (templates/dev/requirements.txt). They arrive here when this repo's
      # workflow SHA is repointed, so Dependabot must not bump them locally.
      - dependency-name: ruff
      - dependency-name: pytest
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
