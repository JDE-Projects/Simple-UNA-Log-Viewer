name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    uses: JDE-Projects/Build-Tools/.github/workflows/release.yml@e12bd20ecdf575c7bdf241c5bc6e6a1c95ffdf61 # Build-Tools main
    permissions:
      id-token: write
      attestations: write
      contents: write
    with:
      app_name: SimpleUNALogViewer
      dist_subfolder: "Simple UNA Log Viewer"
      python_version: "3.14"
      build_command: "Build_Simple_UNA_Log_Viewer.bat"
