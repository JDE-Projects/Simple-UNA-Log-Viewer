name: Release
run-name: Release ${{ github.ref_name }}   # else the run is titled by the tagged commit's message
on:
  push:
    tags: ['v*']
jobs:
  release:
    uses: JDE-Projects/Build-Tools/.github/workflows/release.yml@50c6357e33a5c715e4f55df9e366c9600cca0943 # Build-Tools main (CI checks: ruff, import, pytest)
    permissions:
      id-token: write
      attestations: write
      contents: write
    with:
      app_name: SimpleUNALogViewer
      dist_subfolder: "Simple UNA Log Viewer"
      python_version: "3.14"
      build_command: "Build_Simple_UNA_Log_Viewer.bat"
      app_id: "0c8c994c-416a-4eca-8c6b-3ac1351afea3"
      entry_script: "simple_una_log_viewer.py"
