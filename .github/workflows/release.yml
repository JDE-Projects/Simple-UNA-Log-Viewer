name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    uses: JDE-Projects/Build-Tools/.github/workflows/release.yml@f2713dd841d216ba0f5969a55ad1166104323e55 # Build-Tools main
    permissions:
      id-token: write
      attestations: write
      contents: write
    with:
      app_name: SimpleUNALogViewer
      dist_subfolder: "Simple UNA Log Viewer"
      python_version: "3.14"
      build_command: "Build_Simple_UNA_Log_Viewer.bat"
